<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#f0e6d3;display:flex;justify-content:center;padding:30px}
.card{max-width:480px;width:100%;background:#fff;border-radius:16px;box-shadow:0 6px 30px rgba(0,0,0,.12);overflow:hidden}
.hd{background:linear-gradient(135deg,#c62828,#e53935);color:#fff;padding:16px 20px;text-align:center}
.hd h1{font-size:18px;font-weight:800}
.hd p{font-size:11px;opacity:.8;margin-top:2px}
.bd{padding:16px 20px 20px}
.row{display:grid;grid-template-columns:36px 1fr 50px 60px;gap:6px;padding:10px 0;border-bottom:1px solid #eee;align-items:center;font-size:13px}
.row:last-child{border:none}
.num{font-weight:700;color:#c62828;font-size:12px}
.nm{font-weight:600}
.od{text-align:center;color:#c62828;font-weight:700;font-size:14px}
.rs{text-align:center;background:#e8f5e9;color:#2e7d32;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600}
.ttl{background:#fff8e1;border:2px solid #ffc107;border-radius:10px;padding:14px;margin:14px 0 0;display:flex;justify-content:space-between;align-items:center}
.ttl .lb{font-size:11px;color:#888}
.ttl .vl{font-size:22px;font-weight:800;color:#c62828}
.ttl .sm{font-size:11px;color:#666}
.steps{background:#f5f5f5;border-radius:8px;padding:12px 14px;margin-top:12px;font-size:12px;line-height:1.8;color:#333}
.steps b{color:#c62828}
.btm{background:#f5f5f5;padding:10px 20px;text-align:center;font-size:9px;color:#999;border-top:2px dashed #ddd}
</style></head><body>
<div class="card">
<div class="hd"><h1>🎫 竞彩足球 2串1</h1><p>AI Tool Review 推荐</p></div>
<div class="bd">
<div class="row"><span class="num">#1</span><span class="nm">🇦🇷 阿根廷 vs 🇦🇹 奥地利</span><span class="od">1.31</span><span class="rs">主胜</span></div>
<div class="row"><span class="num">#2</span><span class="nm">🇯🇴 约旦 vs 🇩🇿 阿尔及利亚</span><span class="od">1.34</span><span class="rs">客胜</span></div>
<div class="ttl">
<div><div class="lb">投注金额</div><div class="sm">25 元</div></div>
<div><div class="lb">理论中奖</div><div class="vl">43.88 元</div></div>
<div><div class="lb">赔率</div><div class="sm" style="font-size:16px;font-weight:700;color:#c62828">1.75倍</div></div>
</div>
<div class="steps">
<b>📱 操作步骤：</b><br>
① 找周一041 阿根廷→点<b>1.31</b><br>
② 找周一044 约旦→点<b>1.34</b>（客胜）<br>
③ 顶上点<b>过关选择</b>→选<b>2串1</b><br>
④ 点<b>查看方案</b>→输入25元
</div>
</div>
<div class="btm">⚠️ 理性购彩 · 数据仅供参考</div>
</div></body></html>
