<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#f0e6d3;display:flex;justify-content:center;padding:20px}
.card{max-width:500px;width:100%;background:#fff;border-radius:14px;box-shadow:0 6px 30px rgba(0,0,0,.12);overflow:hidden}
.hd{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;padding:14px 20px;text-align:center}
.hd h1{font-size:18px;font-weight:800}
.hd .tag{background:rgba(255,215,0,.2);color:#ffd700;padding:2px 10px;border-radius:10px;font-size:9px;display:inline-block;margin-bottom:4px}
.bd{padding:12px 18px 14px}
.p{background:#f8f9ff;border:1px solid #e0e4f0;border-radius:8px;padding:10px 12px;margin-bottom:6px}
.p .row{display:flex;justify-content:space-between;align-items:center}
.p .odds{font-size:22px;font-weight:800;color:#c62828}
.p .info{font-size:10px;color:#666;line-height:1.6}
.p .hl{color:#2e7d32;font-weight:600}
.p .gold{color:#f57f17;font-weight:700}
.p .red{color:#c62828}
.p.hot{border-color:#ffc107;background:#fffde7}
.rec{background:#fff8e1;border:2px solid #ffc107;border-radius:8px;padding:10px 12px;margin:6px 0}
.rec h3{font-size:12px;color:#e65100;margin-bottom:4px}
.rec p{font-size:10px;color:#666;line-height:1.7}
.rec .big{font-size:24px;font-weight:800;color:#c62828}
.btm{background:#f5f5f5;padding:8px 18px;text-align:center;font-size:8px;color:#999;border-top:2px dashed #ddd}
</style></head><body>
<div class="card">
<div class="hd"><div class="tag">🎯 对冲策略</div><h1>2026世界杯 投注方案</h1></div>
<div class="bd">

<div class="p">
<div class="row"><span><b>📌 方案A: 7串1</b></span><span class="odds">18.87倍</span></div>
<div class="info">概率 <span class="red">3.6%</span> · 投100中<span class="gold">1,887元</span></div>
</div>

<div class="p hot">
<div class="row"><span><b>⭐ 方案B: 6串7（容错1场）</b></span><span class="odds" style="color:#e65100">17.5倍</span></div>
<div class="info">概率 <span class="hl">15.2%</span> · 投100=7注×14元 · 错1场也能中！</div>
<div class="info">中6场<span class="gold">250元</span> · 中7场<span class="gold">1,056元</span></div>
</div>

<div class="p">
<div class="row"><span><b>📌 方案C: 拆分3组</b></span><span class="odds">8.63倍</span></div>
<div class="info">概率 <span class="hl">8.1%</span> · 3组×33元=100元 · 全中<span class="gold">863元</span></div>
</div>

<div class="rec">
<h3>🎯 最优推荐：方案B（6串7）</h3>
<p>容错1场，胜率提升4倍！<br>
中6场得<span class="big">250元</span> · 中7场得<span class="big">1,056元</span><br>
每注14元×7注=100元，去外围网站直接买6串7</p>
</div>

</div>
<div class="btm">⚠️ 理性购彩 · 建议主买方案B，小注追加冷门</div>
</div></body></html>
